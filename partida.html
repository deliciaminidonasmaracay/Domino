<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dominó Maracay - Final</title>
    <style>
        :root { --oro: #f1c40f; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        #header { background: #1c2833; padding: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--oro); }
        
        /* Mesa con scroll y centrado real */
        #mesa { 
            height: 55vh; background: radial-gradient(circle, #27ae60 0%, #145a32 100%);
            display: flex; align-items: center; overflow-x: auto; padding: 0 50px;
        }
        #camino { display: flex; align-items: center; gap: 4px; margin: 0 auto; }

        /* Dimensionamiento estricto para evitar lo de tus capturas */
        .ficha-tablero { 
            height: 80px !important; 
            width: 40px !important; 
            object-fit: contain;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            flex-shrink: 0;
        }

        #footer { background: #111; padding: 15px; border-top: 2px solid var(--oro); position: fixed; bottom: 0; width: 100%; }
        #mis-fichas { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .ficha-mano { width: 45px; height: auto; cursor: pointer; border-radius: 4px; }
        
        .btn-accion { background: var(--oro); color: #000; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; display: none; margin: 0 auto; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="pantalla-final" class="overlay">
    <h1 id="msg-final" style="color:var(--oro)"></h1>
    <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer">NUEVA PARTIDA</button>
</div>

<div id="header">
    <div style="color:var(--oro)">NOS: <span id="p-nos">0</span></div>
    <div id="rival-info">PC: <span id="pc-count">7</span> | MAZO: <span id="mazo-count">14</span></div>
    <div style="color:var(--oro)">ELLOS: <span id="p-ell">0</span></div>
</div>

<div id="mesa">
    <div id="camino"></div>
</div>

<div id="footer">
    <div id="status-msg" style="text-align:center; color:var(--oro); font-weight:bold;">TU TURNO</div>
    <div style="text-align:center; margin-top:5px;">
        <button id="btn-robar" class="btn-accion" onclick="robar()">ROBAR</button>
        <button id="btn-pasar" class="btn-accion" onclick="pasar()">PASAR</button>
    </div>
    <div id="mis-fichas"></div>
</div>

<script>
    let puntas = { izq: null, der: null };
    let juego = { yo: [], pc: [], mazo: [], terminado: false };

    function getImg(a, b) { return `imagen/${Math.min(a, b)}${Math.max(a, b)}.png`; }

    window.onload = () => {
        let deck = [];
        for (let i=0; i<=6; i++) for (let j=i; j<=6; j++) deck.push([i, j]);
        deck.sort(() => Math.random() - 0.5);
        juego.yo = deck.slice(0, 7);
        juego.pc = deck.slice(7, 14);
        juego.mazo = deck.slice(14);
        renderMano();
    };

    function renderMano() {
        if (juego.terminado) return;
        const cont = document.getElementById('mis-fichas');
        cont.innerHTML = "";
        juego.yo.forEach(f => {
            const img = document.createElement('img');
            img.src = getImg(f[0], f[1]);
            img.className = "ficha-mano";
            img.onclick = () => jugar(f, 'yo');
            cont.appendChild(img);
        });
        document.getElementById('pc-count').innerText = juego.pc.length;
        document.getElementById('mazo-count').innerText = juego.mazo.length;
        checkBotones();
    }

    function jugar(f, autor) {
        if (juego.terminado) return;
        
        let lado = '';
        if (puntas.izq === null) lado = 'der';
        else if (f[0] === puntas.izq || f[1] === puntas.izq) lado = 'izq';
        else if (f[0] === puntas.der || f[1] === puntas.der) lado = 'der';
        else return;

        let v1 = f[0], v2 = f[1], rev = false;
        if (puntas.izq === null) { puntas.izq = v1; puntas.der = v2; }
        else if (lado === 'izq') {
            if (v1 === puntas.izq) { puntas.izq = v2; rev = false; }
            else { puntas.izq = v1; rev = true; }
        } else {
            if (v1 === puntas.der) { puntas.der = v2; rev = true; }
            else { puntas.der = v1; rev = false; }
        }

        const img = document.createElement('img');
        img.src = getImg(v1, v2);
        img.className = "ficha-tablero";
        img.style.transform = (v1 === v2) ? "rotate(0deg)" : (rev ? "rotate(270deg)" : "rotate(90deg)");

        const cam = document.getElementById('camino');
        if (lado === 'izq') cam.insertBefore(img, cam.firstChild);
        else cam.appendChild(img);

        juego[autor] = juego[autor].filter(x => x !== f);

        // LÓGICA DE VICTORIA: Si llega a 0, se acabó.
        if (juego[autor].length === 0) {
            finalizar(autor === 'yo' ? "¡DOMINÓ! GANASTE" : "PC GANÓ LA PARTIDA");
            return;
        }

        if (autor === 'yo') {
            document.getElementById('status-msg').innerText = "PC JUGANDO...";
            setTimeout(turnoPC, 800);
        }
        renderMano();
    }

    function turnoPC() {
        if (juego.terminado) return;
        let f = juego.pc.find(x => x[0] === puntas.izq || x[1] === puntas.izq || x[0] === puntas.der || x[1] === puntas.der);
        if (f) {
            jugar(f, 'pc');
            document.getElementById('status-msg').innerText = "TU TURNO";
        } else if (juego.mazo.length > 0) {
            juego.pc.push(juego.mazo.pop());
            setTimeout(turnoPC, 400);
        } else {
            document.getElementById('status-msg').innerText = "PC PASÓ. TU TURNO";
            renderMano();
        }
    }

    function checkBotones() {
        const puede = juego.yo.some(f => puntas.izq === null || f[0] === puntas.izq || f[1] === puntas.izq || f[0] === puntas.der || f[1] === puntas.der);
        document.getElementById('btn-robar').style.display = (!puede && juego.mazo.length > 0) ? "block" : "none";
        document.getElementById('btn-pasar').style.display = (!puede && juego.mazo.length === 0) ? "block" : "none";
    }

    function robar() {
        if (juego.mazo.length > 0) {
            juego.yo.push(juego.mazo.pop());
            renderMano();
        }
    }

    function pasar() {
        document.getElementById('status-msg').innerText = "PASASTE. JUEGA PC...";
        setTimeout(turnoPC, 800);
    }

    function finalizar(msg) {
        juego.terminado = true;
        document.getElementById('pantalla-final').style.display = 'flex';
        document.getElementById('msg-final').innerText = msg;
    }
</script>
</body>
</html>
