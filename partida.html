<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Dominó Venezuela Pro</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; text-align: center; }
        .mesa-verde { 
            background: radial-gradient(circle, #27ae60 0%, #1e8449 100%);
            border: 8px solid #5d4037; border-radius: 40px; 
            height: 60vh; margin: 10px; display: flex; align-items: center; 
            justify-content: center; overflow: auto; box-shadow: inset 0 0 50px #000;
        }
        #jugades img { height: 60px; margin: 2px; border-radius: 4px; box-shadow: 2px 2px 5px #000; }
        #contenedorFichas { background: rgba(0,0,0,0.5); padding: 15px; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; position: fixed; bottom: 0; width: 100%; }
        .ficha-mano { width: 50px; cursor: pointer; }
        #torn { padding: 15px; font-size: 1.2em; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="torn">TU TURNO</div>
    <div class="mesa-verde"><div id="jugades"></div></div>
    <div id="contenedorFichas"></div>

    <script>
        let puntas = { izq: null, der: null }, miMano = [], manoPC = [], pozo = [];
        
        // REPARTO (Basado en tu regla de 9 fichas si es modo 3)
        function iniciar() {
            let mazo = [];
            for (let i=0; i<=6; i++) for (let j=i; j<=6; j++) mazo.push(`${i}${j}`);
            mazo.sort(() => Math.random() - 0.5);
            
            miMano = mazo.slice(0, 7); 
            manoPC = mazo.slice(7, 14);
            pozo = mazo.slice(14);
            render();
        }

        function render() {
            const cont = document.getElementById('contenedorFichas');
            cont.innerHTML = "";
            miMano.forEach(f => {
                const img = document.createElement('img');
                // IMPORTANTE: Aquí asumo que tus fotos están en la carpeta 'imagen'
                img.src = `imagen/${f}.png`; 
                img.className = "ficha-mano";
                img.onclick = () => jugar(f);
                cont.appendChild(img);
            });
        }

        function jugar(f) {
            const n1 = parseInt(f[0]), n2 = parseInt(f[1]);
            let lado = (puntas.izq === null) ? 'der' : (n1 === puntas.izq || n2 === puntas.izq) ? 'izq' : (n1 === puntas.der || n2 === puntas.der) ? 'der' : null;
            
            if (lado) {
                let inv = false;
                if (puntas.izq === null) { puntas.izq = n1; puntas.der = n2; }
                else if (lado === 'izq') { if (n1 === puntas.izq) { puntas.izq = n2; inv = true; } else { puntas.izq = n1; } }
                else { if (n2 === puntas.der) { puntas.der = n1; inv = true; } else { puntas.der = n2; } }

                const img = document.createElement('img');
                img.src = `imagen/${f}.png`;
                img.style.transform = `rotate(${f[0]===f[1] ? 0 : (inv ? 270 : 90)}deg)`;
                const m = document.getElementById('jugades');
                if (lado === 'izq') m.insertBefore(img, m.firstChild); else m.appendChild(img);

                miMano = miMano.filter(x => x !== f);
                render();
                // Turno de la PC simple para que veas que funciona
                setTimeout(() => { document.getElementById('torn').innerText = "PC JUGÓ"; }, 1000);
            } else {
                alert("Esa ficha no pega!");
            }
        }
        iniciar();
    </script>
</body>
</html>
