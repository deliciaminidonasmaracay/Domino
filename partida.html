<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Juego - Domino Venezuela</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="domino">
        <h2 id="mensajeRed">Conectando con la red...</h2>
        
        <div id="jugades">
            <div id="zonaIzquierda" class="dropZone">Izquierda</div>
            <div id="zonaDerecha" class="dropZone">Derecha</div>
        </div>

        <div id="torn">Espera tu turno...</div>

        <div id="contenedorFichas">
            </div>

        <button id="btnSalir" onclick="window.location.href='index.html'" style="margin-top: 20px; background: #c0392b;">SALIR</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="js/main.js"></script>
    <script src="js/partida.js"></script>

    <script>
        // Lógica para detectar modo PC y no quedarse pegado
        const params = new URLSearchParams(window.location.search);
        const modo = params.get('modo');

        if (modo === 'PC') {
            document.getElementById('mensajeRed').innerText = "MODO: Tú vs Computadora";
            document.getElementById('mensajeRed').style.color = "#f1c40f";
            // Aquí puedes llamar a una función de tu partida.js que inicie los bots
            if (typeof iniciarBots === "function") {
                iniciarBots();
            }
        }
    </script>
</body>
</html>
