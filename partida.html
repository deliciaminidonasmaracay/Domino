<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dominó Maracay</title>
    <style>
        :root { --oro: #f1c40f; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        #header { background: #1c2833; padding: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--oro); }
        
        /* Mesa con Scroll Horizontal */
        #mesa { 
            height: 60vh; background: radial-gradient(circle, #27ae60 0%, #145a32 100%);
            display: flex; align-items: center; justify-content: center; overflow-x: auto; overflow-y: hidden;
        }
        #camino { display: flex; align-items: center; padding: 40px; gap: 4px; min-width: 100%; justify-content: center; }

        /* Dimensionamiento Estricto */
        .ficha-tablero { 
            height: 100px; /* Tamaño fijo para que todas casen */
            width: auto; 
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.4));
            transition: transform 0.2s;
        }

        #footer { background: #111; padding: 15px; border-top: 2px solid var(--oro); position: fixed; bottom: 0; width: 100%; }
        #mis-fichas { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .ficha-mano { width: 55px; height: auto; cursor: pointer; border-radius: 4px; }
        
        .btn-accion { background: var(--oro); color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; margin: 10px auto; display: none; }
    </style>
</head>
<body>

<div id="header">
    <div style="color:var(--oro)">NOS: <span id="p-nos">0</span></div>
    <div>1 VS PC</div>
    <div style="color:var(--oro)">ELLOS: <span id="p-ell">0</span></div>
</div>

<div id="mesa">
    <div id="camino"></div>
</div>

<div id="footer">
    <div id="status" style="text-align:center; color:var(--oro); margin-bottom:10px; font-weight:bold;">TU TURNO</div>
    <div style="text-align:center">
        <button id="btn-robar" class="btn-accion" onclick="robar()">ROBAR</button>
        <button id="btn-pasar" class="btn-accion" onclick="pasar()">PASAR</button>
    </div>
    <div id="mis-fichas"></div>
</div>

<script>
    let puntas = { izq: null, der: null };
    let manos = { yo: [], pc: [], mazo: [] };

    // Función para obtener la imagen siempre en el orden menor-mayor que tienes en tu carpeta
    function getImgSrc(a, b) {
        const menor = Math.min(a, b);
        const mayor = Math.max(a, b);
        return `imagen/${menor}${mayor}.png`;
    }

    window.onload = () => {
        let deck = [];
        for (let i=0; i<=6; i++) for (let j=i; j<=6; j++) deck.push([i, j]);
        deck.sort(() => Math.random() - 0.5);
        manos.yo = deck.slice(0, 7);
        manos.pc = deck.slice(7, 14);
        manos.mazo = deck.slice(14);
        actualizarMano();
    };

    function actualizarMano() {
        const contenedor = document.getElementById('mis-fichas');
        contenedor.innerHTML = "";
        manos.yo.forEach(f => {
            const img = document.createElement('img');
            img.src = getImgSrc(f[0], f[1]);
            img.className = "ficha-mano";
            img.onclick = () => intentarJugar(f);
            contenedor.appendChild(img);
        });
        verificarBotones();
    }

    function intentarJugar(f) {
        if (puntas.izq === null) colocar(f, 'der');
        else if (f[0] === puntas.izq || f[1] === puntas.izq) colocar(f, 'izq');
        else if (f[0] === puntas.der || f[1] === puntas.der) colocar(f, 'der');
    }

    function colocar(f, lado) {
        let v1 = f[0], v2 = f[1];
        let rotar180 = false;

        // Lógica de puntas y rotación visual
        if (puntas.izq === null) {
            puntas.izq = v1; puntas.der = v2;
        } else if (lado === 'izq') {
            if (v1 === puntas.izq) { puntas.izq = v2; rotar180 = false; } 
            else { puntas.izq = v1; rotar180 = true; }
        } else {
            if (v1 === puntas.der) { puntas.der = v2; rotar180 = true; } 
            else { puntas.der = v1; rotar180 = false; }
        }

        const img = document.createElement('img');
        img.src = getImgSrc(v1, v2);
        img.className = "ficha-tablero";

        // Ajuste de posición: 
        // Si no es doble, se acuesta. Si rotar180 es true, se invierte el sentido
        let transformacion = "rotate(90deg)";
        if (v1 === v2) transformacion = "rotate(0deg)";
        else if (rotar180) transformacion = "rotate(270deg)"; // 90 + 180 para invertir

        img.style.transform = transformacion;

        const area = document.getElementById('camino');
        if (lado === 'izq') area.insertBefore(img, area.firstChild);
        else area.appendChild(img);

        manos.yo = manos.yo.filter(x => x !== f);
        actualizarMano();
        
        document.getElementById('status').innerText = "PC PENSANDO...";
        setTimeout(turnoPC, 1000);
    }

    function turnoPC() {
        let fPC = manos.pc.find(f => f[0] === puntas.izq || f[1] === puntas.izq || f[0] === puntas.der || f[1] === puntas.der);
        if (fPC) {
            // Lógica similar a colocar pero para PC (simplificada)
            let lado = (fPC[0] === puntas.izq || fPC[1] === puntas.izq) ? 'izq' : 'der';
            colocarPC(fPC, lado);
        } else if (manos.mazo.length > 0) {
            manos.pc.push(manos.mazo.pop());
            setTimeout(turnoPC, 500);
        } else {
            document.getElementById('status').innerText = "PC PASÓ. TU TURNO";
            verificarBotones();
        }
    }

    function colocarPC(f, lado) {
        // Ejecuta la misma lógica visual que la del jugador
        let v1 = f[0], v2 = f[1];
        let rotar180 = false;
        if (lado === 'izq') {
            if (v1 === puntas.izq) { puntas.izq = v2; rotar180 = false; } else { puntas.izq = v1; rotar180 = true; }
        } else {
            if (v1 === puntas.der) { puntas.der = v2; rotar180 = true; } else { puntas.der = v1; rotar180 = false; }
        }
        const img = document.createElement('img');
        img.src = getImgSrc(v1, v2);
        img.className = "ficha-tablero";
        img.style.transform = (v1 === v2) ? "rotate(0deg)" : (rotar180 ? "rotate(270deg)" : "rotate(90deg)");
        const area = document.getElementById('camino');
        if (lado === 'izq') area.insertBefore(img, area.firstChild); else area.appendChild(img);
        manos.pc = manos.pc.filter(x => x !== f);
        document.getElementById('status').innerText = "TU TURNO";
        verificarBotones();
    }

    function verificarBotones() {
        const puede = manos.yo.some(f => puntas.izq === null || f[0] === puntas.izq || f[1] === puntas.izq || f[0] === puntas.der || f[1] === puntas.der);
        document.getElementById('btn-robar').style.display = (!puede && manos.mazo.length > 0) ? "block" : "none";
        document.getElementById('btn-pasar').style.display = (!puede && manos.mazo.length === 0) ? "block" : "none";
    }

    function robar() {
        if (manos.mazo.length > 0) {
            manos.yo.push(manos.mazo.pop());
            actualizarMano();
        }
    }

    function pasar() {
        document.getElementById('status').innerText = "PC JUGANDO...";
        setTimeout(turnoPC, 1000);
    }
</script>
</body>
</html>
