<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Dominó Maracay - Pro</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div id="torn">ESPERANDO...</div>
            <div id="puntos-info">Objetivo: <span id="meta-puntos">100</span></div>
        </div>

        <div class="board-wrapper">
            <div id="board" class="mesa-verde">
                <div id="jugades"></div>
            </div>
        </div>

        <div id="player-hand-container">
            <div id="contenedorFichas"></div>
        </div>
        
        <div id="game-footer">
            <div id="fichas-pc">Oponente: --</div>
            <button id="btn-robar" style="display:none;" onclick="intentarRobar()">ROBAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <script src="js/partida.js"></script>
</body>
</html>
