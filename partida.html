<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Dominó Maracay - Motor Real</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        #header { background: #1c2833; padding: 10px; display: flex; justify-content: space-between; border-bottom: 3px solid #f1c40f; }
        
        /* LA MESA: Ahora es un contenedor que SI atrapa las fichas */
        .mesa-verde { 
            background: radial-gradient(circle, #2ecc71 0%, #1b5e20 100%);
            border: 10px solid #4e342e; border-radius: 40px; 
            width: 90vw; height: 50vh; margin: 15px auto;
            position: relative; overflow: auto; /* Permite scroll si la cadena es larga */
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 50px #000;
        }

        /* EL RIEL: Donde se alinean las fichas como en Dominoes 365 */
        #jugades { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            white-space: nowrap; 
            padding: 20px;
            min-width: 100%;
        }

        #jugades img { 
            height: 90px; /* Tamaño grande para que se vean los puntos */
            margin: 2px; 
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.7)); 
        }

        .info-jugador { position: absolute; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 5px; border: 1px solid #f1c40f; z-index: 10; font-size: 12px; }
        .pos-arriba { top: 5px; left: 50%; transform: translateX(-50%); }

        #footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 0; border-top: 3px solid #f1c40f; }
        #contenedorFichas { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .ficha-mano { width: 60px; cursor: pointer; }
        #torn { text-align: center; color: #f1c40f; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="header">
        <div>NOS: <span id="pts-nos" style="color:#f1c40f">0</span></div>
        <div>ELLOS: <span id="pts-ell" style="color:#f1c40f">0</span></div>
    </div>

    <div class="info-jugador pos-arriba">RIVAL: <span id="cant-op">7</span> piezas</div>

    <div class="mesa-verde">
        <div id="jugades"></div>
    </div>

    <div id="footer">
        <div id="torn">TU TURNO</div>
        <div id="contenedorFichas"></div>
    </div>

    <script>
        let puntas = { izq: null, der: null };
        let manoYo = [];
        let manoPC = [];

        function getFichaImg(f) { return `imagen/ficha_${f[0]}_${f[1]}.png`; }

        window.onload = () => {
            let mazo = [];
            for (let i=0; i<=6; i++) for (let j=i; j<=6; j++) mazo.push(`${i}${j}`);
            mazo.sort(() => Math.random() - 0.5);
            
            manoYo = mazo.slice(0, 7);
            manoPC = mazo.slice(7, 14);
            actualizarMano();
        };

        function actualizarMano() {
            const cont = document.getElementById('contenedorFichas');
            cont.innerHTML = "";
            manoYo.forEach(f => {
                const img = document.createElement('img');
                img.src = getFichaImg(f);
                img.className = "ficha-mano";
                img.onclick = () => intentarJugar(f, "yo");
                cont.appendChild(img);
            });
            document.getElementById('cant-op').innerText = manoPC.length;
        }

        function intentarJugar(f, autor) {
            const n1 = parseInt(f[0]), n2 = parseInt(f[1]);
            if (puntas.izq === null) ponerFicha(f, 'der', autor);
            else if (n1 === puntas.izq || n2 === puntas.izq) ponerFicha(f, 'izq', autor);
            else if (n1 === puntas.der || n2 === puntas.der) ponerFicha(f, 'der', autor);
        }

        function ponerFicha(f, lado, autor) {
            const n1 = parseInt(f[0]), n2 = parseInt(f[1]);
            let debeInvertir = false;

            if (puntas.izq === null) {
                puntas.izq = n1; puntas.der = n2;
            } else if (lado === 'izq') {
                if (n1 === puntas.izq) { puntas.izq = n2; debeInvertir = true; } 
                else { puntas.izq = n1; }
            } else {
                if (n2 === puntas.der) { puntas.der = n1; debeInvertir = true; } 
                else { puntas.der = n2; }
            }

            // CREAR LA IMAGEN Y METERLA AL RIEL
            const img = document.createElement('img');
            img.src = getFichaImg(f);
            
            // Rotación lógica: Si es doble va parada, si no, acostada
            if (n1 !== n2) {
                img.style.transform = debeInvertir ? "rotate(270deg)" : "rotate(90deg)";
            }

            const riel = document.getElementById('jugades');
            if (lado === 'izq') riel.insertBefore(img, riel.firstChild);
            else riel.appendChild(img);

            if (autor === "yo") {
                manoYo = manoYo.filter(x => x !== f);
                setTimeout(turnoIA, 1000);
            } else {
                manoPC = manoPC.filter(x => x !== f);
            }
            actualizarMano();
        }

        function turnoIA() {
            let fIA = manoPC.find(f => 
                parseInt(f[0])===puntas.izq || parseInt(f[1])===puntas.izq || 
                parseInt(f[0])===puntas.der || parseInt(f[1])===puntas.der
            );
            if (fIA) intentarJugar(fIA, "pc");
        }
    </script>
</body>
</html>
