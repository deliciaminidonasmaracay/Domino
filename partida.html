<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Dominó Maracay - Final</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* CABECERA CON PUNTAJE */
        #header { 
            background: #2c3e50; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 3px solid #f1c40f;
        }
        .marcador { font-size: 1.2em; font-weight: bold; }
        .puntos { color: #f1c40f; }

        /* MESA */
        .mesa-verde { 
            background: radial-gradient(circle, #27ae60 0%, #1e8449 100%);
            border: 10px solid #5d4037; border-radius: 40px; 
            height: 55vh; margin: 10px; position: relative;
            box-shadow: inset 0 0 50px #000; display: flex; align-items: center; justify-content: center;
        }
        #jugades { display: flex; align-items: center; justify-content: center; }
        #jugades img { height: 70px; margin: 1px; border-radius: 4px; box-shadow: 2px 2px 5px #000; }

        /* PIEDRAS DEL OPONENTE (Visual) */
        #area-pc { padding: 5px; text-align: center; }
        .ficha-oculta { width: 30px; height: 50px; background: #eee; border: 2px solid #999; border-radius: 4px; display: inline-block; margin: 2px; position: relative; }
        .ficha-oculta::after { content: "•"; color: #333; font-size: 30px; position: absolute; top: 5px; left: 8px; }

        /* CONTENEDOR DE JUGADOR Y BOTÓN */
        #footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px 0; }
        #contenedorFichas { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .ficha-mano { width: 55px; cursor: pointer; transition: 0.2s; }
        
        #btn-accion { 
            display: none; background: #e67e22; color: white; border: none; 
            padding: 10px 30px; border-radius: 5px; font-weight: bold; margin: 0 auto 10px auto;
        }
        
        #torn { text-align: center; font-size: 1.1em; color: #f1c40f; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="header">
        <div class="marcador">TÚ: <span id="pts-yo" class="puntos">0</span></div>
        <div id="torn">CARGANDO...</div>
        <div class="marcador">PC: <span id="pts-pc" class="puntos">0</span></div>
    </div>

    <div id="area-pc">
        <div id="visual-pc"></div> </div>
    
    <div class="mesa-verde">
        <div id="jugades"></div>
    </div>

    <div id="footer">
        <button id="btn-accion" onclick="accionMazo()"></button>
        <div id="contenedorFichas"></div>
    </div>
