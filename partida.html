<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dominó Maracay - Estable</title>
    <style>
        :root { --oro: #f1c40f; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #header { background: #1c2833; padding: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--oro); position: relative; z-index: 10; }
        
        /* Mesa con soporte para Zoom y Arrastre */
        #mesa-container {
            height: 55vh; overflow: hidden; background: radial-gradient(circle, #27ae60 0%, #145a32 100%);
            position: relative; cursor: grab;
        }
        #camino { 
            display: flex; align-items: center; gap: 0px; position: absolute;
            top: 50%; left: 50%; transform-origin: center; transform: translate(-50%, -50%) scale(1);
        }

        /* Estética de las fichas en la mesa */
        .bloque-ficha { width: 80px; height: 45px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .bloque-doble { width: 45px; height: 80px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        .ficha-tablero { height: 80px; width: 45px; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.4)); }

        /* Clases de rotación según tu lógica */
        .giro-izq { transform: rotate(-90deg); } /* Acostada a la izquierda */
        .giro-der { transform: rotate(90deg); }  /* Acostada a la derecha */
        .doble-parado { transform: rotate(0deg); } /* Doble atravesado */

        #footer { background: #111; padding: 15px; border-top: 2px solid var(--oro); position: fixed; bottom: 0; width: 100%; z-index: 10; }
        #mis-fichas { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .ficha-mano { width: 45px; height: auto; cursor: pointer; border: 1px solid #333; border-radius: 4px; }
        
        .btn-oro { background: var(--oro); color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #selector-punta { display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; border: 1px solid var(--oro); z-index: 100; }
    </style>
</head>
<body>

<div id="header">
    <div>PC: <span id="pc-count">7</span></div>
    <div style="color:var(--oro); font-weight:bold;">DOMINÓ MARACAY</div>
    <div>MAZO: <span id="mazo-count">14</span></div>
</div>

<div id="mesa-container">
    <div id="selector-punta">
        <p style="text-align:center; margin-top:0;">¿Dónde juegas?</p>
        <button class="btn-oro" id="btn-izq">IZQUIERDA</button>
        <button class="btn-oro" id="btn-der">DERECHA</button>
    </div>
    <div id="camino"></div>
</div>

<div id="footer">
    <div id="status-msg" style="text-align:center; color:var(--oro); font-weight:bold;">TU TURNO</div>
    <div id="mis-fichas"></div>
    <div style="text-align:center; margin-top:10px;">
        <button id="btn-robar" style="display:none;" class="btn-oro" onclick="robar()">ROBAR</button>
        <button id="btn-pasar" style="display:none;" class="btn-oro" onclick="pasar()">PASAR</button>
    </div>
</div>

<script>
    let puntas = { izq: null, der: null };
    let juego = { yo: [], pc: [], mazo: [] };
    let escala = 1;

    window.onload = () => {
        let deck = [];
        for (let i=0; i<=6; i++) for (let j=i; j<=6; j++) deck.push([i, j]);
        deck.sort(() => Math.random() - 0.5);
        juego.yo = deck.slice(0, 7);
        juego.pc = deck.slice(7, 14);
        juego.mazo = deck.slice(14);
        renderMano();
        setupZoom();
    };

    function renderMano() {
        const cont = document.getElementById('mis-fichas');
        cont.innerHTML = "";
        juego.yo.forEach(f => {
            const img = document.createElement('img');
            // Usamos siempre el nombre del archivo con los números ordenados
            img.src = `imagen/${Math.min(f[0],f[1])}${Math.max(f[0],f[1])}.png`;
            img.className = "ficha-mano";
            img.onclick = () => intentarJugar(f);
            cont.appendChild(img);
        });
        document.getElementById('pc-count').innerText = juego.pc.length;
        document.getElementById('mazo-count').innerText = juego.mazo.length;
        actualizarBotones();
    }

    function intentarJugar(f) {
        if (puntas.izq === null) { colocar(f, 'der', 'yo'); return; }
        const pI = (f[0] === puntas.izq || f[1] === puntas.izq);
        const pD = (f[0] === puntas.der || f[1] === puntas.der);
        if (pI && pD) {
            document.getElementById('selector-punta').style.display = 'block';
            document.getElementById('btn-izq').onclick = () => { elegir(f, 'izq'); };
            document.getElementById('btn-der').onclick = () => { elegir(f, 'der'); };
        } else if (pI) colocar(f, 'izq', 'yo');
        else if (pD) colocar(f, 'der', 'yo');
    }

    function elegir(f, lado) {
        document.getElementById('selector-punta').style.display = 'none';
        colocar(f, lado, 'yo');
    }

    function colocar(f, lado, autor) {
        let n1 = f[0], n2 = f[1], nombreImg = "";
        const esDoble = (n1 === n2);

        if (puntas.izq === null) {
            puntas.izq = n1; puntas.der = n2;
            nombreImg = `${Math.min(n1,n2)}${Math.max(n1,n2)}`;
        } else if (lado === 'izq') {
            // Si el número que pega es el primero de nuestra ficha
            if (n1 === puntas.izq) { nombreImg = `${n2}${n1}`; puntas.izq = n2; }
            else { nombreImg = `${n1}${n2}`; puntas.izq = n1; }
        } else {
            // Si el número que pega es el primero de nuestra ficha
            if (n1 === puntas.der) { nombreImg = `${n1}${n2}`; puntas.der = n2; }
            else { nombreImg = `${n2}${n1}`; puntas.der = n1; }
        }

        const bloque = document.createElement('div');
        bloque.className = esDoble ? "bloque-doble" : "bloque-ficha";
        
        const img = document.createElement('img');
        // Tu carpeta tiene las fichas como "13.png", aquí buscamos la imagen original
        img.src = `imagen/${Math.min(f[0],f[1])}${Math.max(f[0],f[1])}.png`;
        img.className = "ficha-tablero";
        
        // Aplicar giros basados en tu lógica
        if (esDoble) {
            img.classList.add('doble-parado');
        } else {
            // Si el archivo cargado es "13" pero la lógica pidió "31", invertimos antes de rotar
            let invertida = (nombreImg !== `${Math.min(f[0],f[1])}${Math.max(f[0],f[1])}`);
            if (lado === 'izq') {
                img.style.transform = invertida ? "rotate(90deg)" : "rotate(-90deg)";
            } else {
                img.style.transform = invertida ? "rotate(-90deg)" : "rotate(90deg)";
            }
        }
        
        bloque.appendChild(img);
        const cam = document.getElementById('camino');
        if (lado === 'izq') cam.insertBefore(bloque, cam.firstChild);
        else cam.appendChild(bloque);

        juego[autor] = juego[autor].filter(x => x !== f);
        if (juego[autor].length === 0) { alert(autor === 'yo' ? "¡DOMINÓ!" : "GANÓ PC"); location.reload(); }
        if (autor === 'yo') setTimeout(turnoPC, 800);
        renderMano();
    }

    // Zoom táctil (Pinch-to-zoom)
    function setupZoom() {
        const mesa = document.getElementById('mesa-container');
        const cam = document.getElementById('camino');
        let distInicial = 0, escalaInicial = 1;

        mesa.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                distInicial = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                escalaInicial = escala;
            }
        });
        mesa.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                escala = Math.min(Math.max(escalaInicial * (dist / distInicial), 0.3), 1.5);
                cam.style.transform = `translate(-50%, -50%) scale(${escala})`;
            }
        });
    }

    function turnoPC() {
        let f = juego.pc.find(x => x[0] === puntas.izq || x[1] === puntas.izq || x[0] === puntas.der || x[1] === puntas.der);
        if (f) {
            let lado = (f[0] === puntas.izq || f[1] === puntas.izq) ? 'izq' : 'der';
            colocar(f, lado, 'pc');
        } else if (juego.mazo.length > 0) {
            juego.pc.push(juego.mazo.pop());
            turnoPC();
        }
    }

    function actualizarBotones() {
        const puede = juego.yo.some(f => puntas.izq === null || f[0] === puntas.izq || f[1] === puntas.izq || f[0] === puntas.der || f[1] === puntas.der);
        document.getElementById('btn-robar').style.display = (!puede && juego.mazo.length > 0) ? "inline-block" : "none";
        document.getElementById('btn-pasar').style.display = (!puede && juego.mazo.length === 0) ? "inline-block" : "none";
    }

    function robar() { juego.yo.push(juego.mazo.pop()); renderMano(); }
    function pasar() { setTimeout(turnoPC, 400); }
</script>
</body>
</html>
