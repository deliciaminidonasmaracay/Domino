<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó Venezuela - Mesa</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="pantallaJuego">
        <div id="zona-oponente">
            <div>
                <span id="txtPuntosUsuario" class="marcador-puntos">Usuario: 0</span>
            </div>
            <div id="info-pc">
                <span style="color:white; font-size:12px;">COMPUTADOR</span>
                <div id="fichas-pc">
                    </div>
            </div>
            <div>
                <span id="txtPuntosPC" class="marcador-puntos">PC: 0</span>
            </div>
        </div>
        
        <div id="jugades">
            </div>

        <div id="zona-controles" style="margin: 10px; margin-bottom: 150px;">
            <div id="torn" style="font-weight: bold; color: #ecf0f1; margin-bottom: 5px;">Tu Turno</div>
            <button id="btnAccion" onclick="gestionarPasoORobo()" style="display:none;">
                ROBAR FICHA
            </button>
        </div>
        
        <div id="contenedorFichas"></div>

        <button onclick="window.location.href='index.html'" 
                style="background: #c0392b; color: white; border: none; padding: 5px 10px; border-radius: 5px; position:fixed; top:70px; right:10px; z-index:100; font-size:10px;">
            SALIR
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/partida.js"></script>
</body>
</html>
