<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dominó Maracay</title>
    <style>
        :root { --oro: #f1c40f; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        #header { background: #1c2833; padding: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--oro); }
        
        /* La Mesa (Tapete Verde) */
        #mesa { 
            height: 50vh; background: radial-gradient(circle, #27ae60 0%, #145a32 100%);
            display: flex; align-items: center; overflow-x: auto; padding: 0 60px; position: relative;
        }

        /* Contenedor del camino de fichas */
        #camino { display: flex; align-items: center; gap: 0px; margin: 0 auto; }

        /* EL TRUCO: El contenedor reserva el espacio de la ficha ACOSTADA */
        .bloque-ficha {
            width: 80px; height: 45px; /* Medidas de la ficha de lado */
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .ficha-tablero { 
            height: 80px; width: 45px; 
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.4));
        }

        /* Giros según tu lógica */
        .giro-izq { transform: rotate(-90deg); }
        .giro-der { transform: rotate(90deg); }

        #selector-punta { 
            display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid var(--oro); z-index: 50;
        }

        #footer { background: #111; padding: 15px; border-top: 2px solid var(--oro); position: fixed; bottom: 0; width: 100%; min-height: 160px; }
        #mis-fichas { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .ficha-mano { width: 45px; height: auto; cursor: pointer; border: 1px solid #333; }
        
        .btn-oro { background: var(--oro); color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 0 5px; }
        .btn-accion { background: var(--oro); color: #000; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; display: none; margin: 5px auto; }
    </style>
</head>
<body>

<div id="header">
    <div>PC: <span id="pc-count">7</span></div>
    <div style="color:var(--oro); font-weight:bold;">DOMINÓ MARACAY</div>
    <div>MAZO: <span id="mazo-count">14</span></div>
</div>

<div id="mesa">
    <div id="selector-punta">
        <p style="text-align:center; margin-bottom:10px;">¿Por qué punta juegas?</p>
        <button class="btn-oro" id="btn-izq">IZQUIERDA</button>
        <button class="btn-oro" id="btn-der">DERECHA</button>
    </div>
    <div id="camino"></div>
</div>

<div id="footer">
    <div id="status-msg" style="text-align:center; color:var(--oro);">TU TURNO</div>
    <div style="text-align:center;">
        <button id="btn-robar" class="btn-accion" onclick="robar()">ROBAR</button>
        <button id="btn-pasar" class="btn-accion" onclick="pasar()">PASAR</button>
    </div>
    <div id="mis-fichas"></div>
</div>

<script>
    let puntas = { izq: null, der: null };
    let juego = { yo: [], pc: [], mazo: [] };
    let fichaElegida = null;

    window.onload = () => {
        let deck = [];
        for (let i=0; i<=6; i++) for (let j=i; j<=6; j++) deck.push([i, j]);
        deck.sort(() => Math.random() - 0.5);
        juego.yo = deck.slice(0, 7);
        juego.pc = deck.slice(7, 14);
        juego.mazo = deck.slice(14);
        renderMano();
    };

    function renderMano() {
        const cont = document.getElementById('mis-fichas');
        cont.innerHTML = "";
        juego.yo.forEach(f => {
            const img = document.createElement('img');
            img.src = `imagen/${Math.min(f[0],f[1])}${Math.max(f[0],f[1])}.png`;
            img.className = "ficha-mano";
            img.onclick = () => intentarJugar(f);
            cont.appendChild(img);
        });
        document.getElementById('pc-count').innerText = juego.pc.length;
        document.getElementById('mazo-count').innerText = juego.mazo.length;
        actualizarBotones();
    }

    function intentarJugar(f) {
        if (puntas.izq === null) { colocar(f, 'der', 'yo'); return; }
        const puedeIzq = (f[0] === puntas.izq || f[1] === puntas.izq);
        const puedeDer = (f[0] === puntas.der || f[1] === puntas.der);

        if (puedeIzq && puedeDer) {
            fichaElegida = f;
            document.getElementById('selector-punta').style.display = 'block';
            document.getElementById('btn-izq').onclick = () => { elegir('izq'); };
            document.getElementById('btn-der').onclick = () => { elegir('der'); };
        } else if (puedeIzq) colocar(f, 'izq', 'yo');
        else if (puedeDer) colocar(f, 'der', 'yo');
    }

    function elegir(lado) {
        document.getElementById('selector-punta').style.display = 'none';
        colocar(fichaElegida, lado, 'yo');
    }

    function colocar(f, lado, autor) {
        let n1 = f[0], n2 = f[1], nombreImg = "";

        if (puntas.izq === null) {
            puntas.izq = n1; puntas.der = n2;
            nombreImg = `${n1}${n2}`;
        } else if (lado === 'izq') {
            if (n1 === puntas.izq) { nombreImg = `${n2}${n1}`; puntas.izq = n2; }
            else { nombreImg = `${n1}${n2}`; puntas.izq = n1; }
        } else {
            if (n1 === puntas.der) { nombreImg = `${n1}${n2}`; puntas.der = n2; }
            else { nombreImg = `${n2}${n1}`; puntas.der = n1; }
        }

        const bloque = document.createElement('div');
        bloque.className = "bloque-ficha";
        
        const img = document.createElement('img');
        img.src = `imagen/${nombreImg}.png`;
        img.className = `ficha-tablero ${lado === 'izq' ? 'giro-izq' : 'giro-der'}`;
        
        bloque.appendChild(img);
        const cam = document.getElementById('camino');
        if (lado === 'izq') cam.insertBefore(bloque, cam.firstChild);
        else cam.appendChild(bloque);

        juego[autor] = juego[autor].filter(x => x !== f);
        if (juego[autor].length === 0) { alert(autor === 'yo' ? "¡DOMINÓ!" : "GANÓ PC"); location.reload(); }
        if (autor === 'yo') setTimeout(turnoPC, 800);
        renderMano();
    }

    function turnoPC() {
        let f = juego.pc.find(x => x[0] === puntas.izq || x[1] === puntas.izq || x[0] === puntas.der || x[1] === puntas.der);
        if (f) {
            let lado = (f[0] === puntas.izq || f[1] === puntas.izq) ? 'izq' : 'der';
            colocar(f, lado, 'pc');
        } else if (juego.mazo.length > 0) {
            juego.pc.push(juego.mazo.pop());
            turnoPC();
        }
    }

    function actualizarBotones() {
        const puede = juego.yo.some(f => puntas.izq === null || f[0] === puntas.izq || f[1] === puntas.izq || f[0] === puntas.der || f[1] === puntas.der);
        document.getElementById('btn-robar').style.display = (!puede && juego.mazo.length > 0) ? "block" : "none";
        document.getElementById('btn-pasar').style.display = (!puede && juego.mazo.length === 0) ? "block" : "none";
    }

    function robar() { juego.yo.push(juego.mazo.pop()); renderMano(); }
    function pasar() { setTimeout(turnoPC, 500); }
</script>
</body>
</html>
