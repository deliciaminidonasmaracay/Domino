<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Dominó Venezuela Pro</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        #header { background: #2c3e50; padding: 10px; display: flex; justify-content: space-between; border-bottom: 3px solid #f1c40f; z-index: 100; position: relative; }
        
        .contenedor-mesa { position: relative; width: 100vw; height: 60vh; display: flex; align-items: center; justify-content: center; background: #111; }
        
        .mesa-verde { 
            background: radial-gradient(circle, #27ae60 0%, #1e8449 100%);
            border: 10px solid #5d4037; border-radius: 50px; 
            width: 85%; height: 80%; position: relative;
            box-shadow: inset 0 0 50px #000; overflow: hidden; z-index: 1;
        }

        /* LAS PIEDRAS DE LOS OPONENTES - AHORA CON Z-INDEX ALTO */
        .info-jugador { 
            position: absolute; background: rgba(0,0,0,0.8); padding: 8px; 
            border-radius: 8px; text-align: center; z-index: 50; 
            border: 1px solid #f1c40f; min-width: 100px;
        }
        .pos-arriba { top: 10px; left: 50%; transform: translateX(-50%); }
        .pos-derecha { right: 10px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .pos-izquierda { left: 10px; top: 50%; transform: translateY(-50%) rotate(90deg); }
        
        /* ESTILO DE LAS FICHAS BLANCAS (PINTAS) */
        .pintas-visual { display: flex; gap: 4px; justify-content: center; margin-top: 5px; flex-wrap: wrap; }
        .pinta-back { 
            width: 14px; height: 22px; background: #ffffff; /* Blanco puro para que se vea */
            border: 1px solid #000; border-radius: 3px; 
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        #jugades { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 5; }
        #jugades img { height: 75px; margin: 1px; filter: drop-shadow(2px 2px 3px #000); }

        #footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 0; border-top: 2px solid #f1c40f; z-index: 100; }
        #contenedorFichas { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; padding: 5px; }
        .ficha-mano { width: 55px; cursor: pointer; border-radius: 4px; }
        
        #btn-accion { display: none; background: #e67e22; color: #fff; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        #torn { text-align: center; color: #f1c40f; font-weight: bold; margin-bottom: 5px; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="header">
        <div>NOS: <span id="pts-nos" style="color:#f1c40f">0</span></div>
        <div id="status">PARTIDA</div>
        <div>ELLOS: <span id="pts-ell" style="color:#f1c40f">0</span></div>
    </div>

    <div class="contenedor-mesa">
        <div id="ui-arriba" class="info-jugador pos-arriba">
            <span id="label-top">RIVAL</span>
            <div id="v-op-top" class="pintas-visual"></div>
        </div>
        
        <div id="ui-izq" class="info-jugador pos-izquierda">OP 1<div id="v-op-izq" class="pintas-visual"></div></div>
        <div id="ui-der" class="info-jugador pos-derecha">OP 2<div id="v-op-der" class="pintas-visual"></div></div>

        <div class="mesa-verde">
            <div id="jugades"></div>
        </div>
    </div>

    <div id="footer">
        <div id="torn">TU TURNO</div>
        <center><button id="btn-accion" onclick="manoMazo()"></button></center>
        <div id="contenedorFichas"></div>
    </div>

    <script>
        let puntas = { izq: null, der: null };
        let manos = { yo: [], opTop: [], opIzq: [], opDer: [], pozo: [] };
        const params = new URLSearchParams(window.location.search);
        const modo = params.get('mode') || 'pc';

        function getFichaImg(f) { return `imagen/ficha_${f[0]}_${f[1]}.png`; }

        window.onload = () => {
            let mazo = [];
            for (let i=0; i<=6; i++) for (let j=i; j<=6; j++) mazo.push(`${i}${j}`);
            mazo.sort(() => Math.random() - 0.5);
            
            if (modo === '2vs2') {
                manos.yo = mazo.slice(0, 7);
                manos.opIzq = mazo.slice(7, 14);
                manos.opTop = mazo.slice(14, 21);
                manos.opDer = mazo.slice(21, 28);
            } else {
                document.getElementById('ui-izq').style.display = 'none';
                document.getElementById('ui-der').style.display = 'none';
                manos.yo = mazo.slice(0, 7);
                manos.opTop = mazo.slice(7, 14);
                manos.pozo = mazo.slice(14);
            }
            actualizarUI();
        };

        function actualizarUI() {
            const cont = document.getElementById('contenedorFichas');
            cont.innerHTML = "";
            manos.yo.forEach(f => {
                const img = document.createElement('img');
                img.src = getFichaImg(f);
                img.className = "ficha-mano";
                img.onclick = () => intentarJugar(f, "yo");
                cont.appendChild(img);
            });

            // RENDERIZADO CRÍTICO DE PIEZAS VISIBLES
            renderPiedras('v-op-top', manos.opTop.length);
            if (modo === '2vs2') {
                renderPiedras('v-op-izq', manos.opIzq.length);
                renderPiedras('v-op-der', manos.opDer.length);
            }
            verificarPasoORobo();
        }

        function renderPiedras(id, cant) {
            const div = document.getElementById(id);
            if (!div) return;
            div.innerHTML = "";
            for(let i=0; i<cant; i++) {
                const p = document.createElement('div');
                p.className = "pinta-back";
                div.appendChild(p);
            }
        }

        function intentarJugar(f, autor) {
            const n1 = parseInt(f[0]), n2 = parseInt(f[1]);
            let lado = null;
            if (puntas.izq === null) lado = 'der';
            else if (n1 === puntas.izq || n2 === puntas.izq) lado = 'izq';
            else if (n1 === puntas.der || n2 === puntas.der) lado = 'der';
            
            if (lado) poner(f, lado, autor);
        }

        function poner(f, lado, autor) {
            const n1 = parseInt(f[0]), n2 = parseInt(f[1]);
            let inv = false;

            if (puntas.izq === null) { puntas.izq = n1; puntas.der = n2; }
            else if (lado === 'izq') {
                if (n1 === puntas.izq) { puntas.izq = n2; inv = true; } else { puntas.izq = n1; }
            } else {
                if (n2 === puntas.der) { puntas.der = n1; inv = true; } else { puntas.der = n2; }
            }

            const img = document.createElement('img');
            img.src = getFichaImg(f);
            img.style.transform = `rotate(${n1===n2 ? 0 : (inv ? 270 : 90)}deg)`;
            document.getElementById('jugades').appendChild(img);

            manos[autor] = manos[autor].filter(x => x !== f);
            actualizarUI();

            if (manos[autor].length === 0) { alert("¡Dominó!"); location.reload(); return; }

            let sig = (modo === '2vs2') ? { "yo":"opIzq", "opIzq":"opTop", "opTop":"opDer", "opDer":"yo" } : { "yo":"opTop", "opTop":"yo" };
            let proximo = sig[autor];
            if (proximo !== "yo") {
                document.getElementById('torn').innerText = "ESPERANDO...";
                setTimeout(() => turnoIA(proximo), 1000);
            } else {
                document.getElementById('torn').innerText = "TU TURNO";
            }
        }

        function turnoIA(quien) {
            let fIA = manos[quien].find(f => parseInt(f[0])===puntas.izq || parseInt(f[1])===puntas.izq || parseInt(f[0])===puntas.der || parseInt(f[1])===puntas.der);
            if (fIA) intentarJugar(fIA, quien);
            else if (modo !== '2vs2' && manos.pozo.length > 0) {
                manos[quien].push(manos.pozo.pop());
                actualizarUI();
                setTimeout(() => turnoIA(quien), 500);
            } else {
                let sig = (modo === '2vs2') ? { "opIzq":"opTop", "opTop":"opDer", "opDer":"yo" } : { "opTop":"yo" };
                let proximo = sig[quien] || "yo";
                if(proximo !== "yo") turnoIA(proximo);
                else { document.getElementById('torn').innerText = "TU TURNO"; verificarPasoORobo(); }
            }
        }

        function verificarPasoORobo() {
            const puede = manos.yo.some(f => puntas.izq === null || parseInt(f[0]) === puntas.izq || parseInt(f[1]) === puntas.izq || parseInt(f[0]) === puntas.der || parseInt(f[1]) === puntas.der);
            const btn = document.getElementById('btn-accion');
            if (!puede) {
                btn.style.display = "block";
                btn.innerText = (modo !== '2vs2' && manos.pozo.length > 0) ? "ROBAR DEL MAZO" : "PASAR TURNO";
            } else btn.style.display = "none";
        }

        function manoMazo() {
            if (modo !== '2vs2' && manos.pozo.length > 0) {
                manos.yo.push(manos.pozo.pop());
                actualizarUI();
            } else {
                document.getElementById('btn-accion').style.display = "none";
                turnoIA(modo === '2vs2' ? "opIzq" : "opTop");
            }
        }
    </script>
</body>
</html>
