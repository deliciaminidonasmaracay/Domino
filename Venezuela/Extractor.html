<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor Forzado - Dominó</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: #e0e0e0; margin: 0; }
        .box { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-green { background: #2ecc71; color: #fff; }
        .btn-blue { background: #3498db; color: #fff; border: 2px solid #fff; }
        textarea { width: 100%; height: 200px; background: #000; color: #00ff00; font-family: monospace; border-radius: 8px; margin-top: 15px; padding: 10px; box-sizing: border-box; }
        #status { text-align: center; margin: 10px 0; font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

<div class="box">
    <h3>Analizador de Modelos</h3>
    <input type="text" id="targetUrl" value="https://www.dominoes365.io/es/" placeholder="Pega la URL aquí">
    
    <button class="btn-green" onclick="fetchSource()">1. CAPTURAR CÓDIGO</button>
    
    <button class="btn-blue" onclick="saveToFile()">2. DESCARGAR ARCHIVO TXT</button>

    <div id="status">Listo para extraer</div>
    <textarea id="output" readonly></textarea>
</div>

<script>
    let globalData = "";

    async function fetchSource() {
        const url = document.getElementById('targetUrl').value;
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        if (!url) return alert("Ingresa una URL");

        status.innerText = "⏳ Extrayendo... espera un momento.";
        
        // Proxy para saltar bloqueos en Android
        const finalUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);

        try {
            const resp = await fetch(finalUrl);
            const json = await resp.json();
            
            globalData = json.contents;
            output.value = globalData;
            status.innerText = "✅ Captura completada con éxito.";

        } catch (e) {
            status.innerText = "❌ Error al capturar.";
            output.value = "Error de conexión. Prueba con otra URL.";
        }
    }

    function saveToFile() {
        if (!globalData) {
            // Si el textarea tiene algo pero globalData no (por un refresh), lo intentamos recuperar
            globalData = document.getElementById('output').value;
        }
        
        if (!globalData) return alert("Primero debes capturar el código");

        const blob = new Blob([globalData], { type: "text/plain" });
        const link = document.createElement("a");
        const filename = "codigo_extraido_" + new Date().getTime() + ".txt";
        
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        status.innerText = "💾 Archivo '" + filename + "' guardado.";
    }
</script>

</body>
</html>
