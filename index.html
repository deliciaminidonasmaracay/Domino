<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó Venezuela - Menú Principal</title>
    <style>
        /* Mantenemos tu diseño original oscuro y elegante */
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        button {
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: 2px solid #f1c40f;
            border-radius: 8px;
            background: #1e293b;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover {
            background: #f1c40f;
            color: #0f172a;
            transform: scale(1.02);
        }

        button:disabled {
            border-color: #475569;
            color: #475569;
            cursor: not-allowed;
        }

        /* POP-UP DE REGISTRO / PERSISTENCIA */
        #popupRegistro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            display: none; /* Se activa por JS */
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #f1c40f;
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.2);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .btn-reg { background: #27ae60; border: none; margin-bottom: 10px; width: 100%; }
        .btn-anon { background: #576574; border: none; width: 100%; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>DOMINÓ MARACAY</h1>

    <div class="menu-container">
        <button onclick="irAPartida('pc')">JUGAR CONTRA PC</button>
        <button onclick="irAPartida('1vs1')">JUGADOR VS JUGADOR (Online)</button>
        <button onclick="irAPartida('2vs2')">MODO 2 VS 2</button>
        <button disabled>TORNEOS (Próximamente)</button>
    </div>

    <div id="popupRegistro">
        <div class="modal-content">
            <h2 style="color: #f1c40f; margin: 0;">BIENVENIDO</h2>
            <p style="font-size: 0.9rem; color: #cbd5e1;">Ingresa para guardar tu progreso</p>
            
            <input type="text" id="inputNombre" placeholder="Escribe tu nombre...">
            
            <button class="btn-reg" onclick="registrar(false)">ENTRAR</button>
            <button class="btn-anon" onclick="registrar(true)">JUGAR COMO ANÓNIMO</button>
        </div>
    </div>

    <script>
        // Función para redirigir manteniendo el modo
        function irAPartida(modo) {
            window.location.href = `partida.html?mode=${modo}`;
        }

        // Lógica de Persistencia y Caché Temporal
        function registrar(esAnonimo) {
            let nombre = document.getElementById('inputNombre').value.trim();
            
            if (esAnonimo) {
                // Si es anónimo, verificamos si ya existe uno en cache para no duplicar IDs
                const viejoNombre = localStorage.getItem('domino_user');
                nombre = (viejoNombre && viejoNombre.includes("Anonimo")) ? viejoNombre : "Anonimo" + Math.floor(Math.random() * 1000);
            } else {
                if (nombre === "") {
                    alert("Por favor, ingresa un nombre.");
                    return;
                }
            }

            // GUARDAR EN LOCALSTORAGE (La clave para la persistencia)
            localStorage.setItem('domino_user', nombre);
            
            // Creamos un ID de sesión único si no existe
            if (!localStorage.getItem('domino_session_id')) {
                localStorage.setItem('domino_session_id', 'sess_' + Date.now() + Math.random().toString(36).substr(2, 5));
            }

            document.getElementById('popupRegistro').style.display = 'none';
        }

        // Al cargar la página, comprobar si ya existe el usuario
        window.onload = function() {
            const usuarioGuardado = localStorage.getItem('domino_user');
            if (!usuarioGuardado) {
                document.getElementById('popupRegistro').style.display = 'flex';
            }
        };
    </script>
</body>
    </html>
