<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó Maracay - Menú</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="modalRegistro" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; justify-content:center; align-items:center;">
        <div style="background:#2c3e50; padding:30px; border-radius:15px; border:2px solid #f1c40f; text-align:center; color:white; width:90%; max-width:400px;">
            <h2 style="color:#f1c40f;">BIENVENIDO</h2>
            <p style="margin:15px 0;">¿Cómo quieres jugar hoy?</p>
            <input type="text" id="nombreUsuario" placeholder="Escribe tu nombre..." style="padding:12px; width:100%; border-radius:5px; border:none; margin-bottom:10px;">
            <button onclick="gestionarEntrada(false)" style="background:#27ae60; color:white; border:none; padding:12px; width:100%; border-radius:5px; font-weight:bold; cursor:pointer;">REGISTRARSE</button>
            <hr style="margin:15px 0; opacity:0.3;">
            <button onclick="gestionarEntrada(true)" style="background:#7f8c8d; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">JUGAR COMO ANÓNIMO</button>
        </div>
    </div>

    <div id="menuPrincipal">
        <h1>DOMINÓ MARACAY</h1>
        <button onclick="window.location.href='partida.html'">JUGAR CONTRA PC</button>
        <button disabled title="Próximamente">MULTIJUGADOR (Firebase)</button>
    </div>

    <script>
        function gestionarEntrada(esAnonimo) {
            let nombre = "";
            if (esAnonimo) {
                const previo = localStorage.getItem('domino_user_name');
                nombre = (previo && previo.includes("Anonimo")) ? previo : "Anonimo" + Math.floor(Math.random() * 1000);
            } else {
                nombre = document.getElementById('nombreUsuario').value.trim();
                if (!nombre) return alert("Escribe un nombre");
            }
            localStorage.setItem('domino_user_name', nombre);
            if (!localStorage.getItem('domino_user_id')) {
                localStorage.setItem('domino_user_id', 'id_' + Date.now());
            }
            document.getElementById('modalRegistro').style.display = 'none';
        }

        window.onload = () => {
            if (localStorage.getItem('domino_user_name')) {
                document.getElementById('modalRegistro').style.display = 'none';
            }
        };
    </script>
</body>
</html>
