<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domino Venezuela - Inicio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Ajustes específicos para que se vea profesional y oscuro */
        body {
            background: linear-gradient(135deg, #1a252f 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .contenedor-inicio {
            background-color: rgba(44, 62, 80, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            width: 90%;
            max-width: 450px;
        }
        .modo-selector {
            display: grid;
            gap: 10px;
            margin: 20px 0;
        }
        .estado-espera {
            background: #000;
            border: 1px solid #27ae60;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none; /* Se activa con JS */
        }
        .contador {
            font-size: 24px;
            color: #f1c40f;
            font-weight: bold;
        }
        .btn-modo {
            background-color: #34495e;
            border: 1px solid #f1c40f;
            transition: 0.3s;
        }
        .btn-modo:hover {
            background-color: #f1c40f;
            color: #1a252f;
        }
    </style>
</head>
<body>

<div class="contenedor-inicio">
    <h1>DOMINÓ VENEZUELA</h1>
    <p>Selecciona el modo de juego:</p>

    <div class="modo-selector" id="menuModos">
        <button class="btn-modo" onclick="seleccionarModo('PC')">Vs Computadora</button>
        <button class="btn-modo" onclick="seleccionarModo('2')">Duelo (2 Personas)</button>
        <button class="btn-modo" onclick="seleccionarModo('3')">Trío (3 Personas)</button>
        <button class="btn-modo" onclick="seleccionarModo('4')">Mesa Completa (4 Personas)</button>
    </div>

    <div id="ventanaEspera" class="estado-espera">
        <h3>En espera de jugadores...</h3>
        <div class="contador" id="contadorJugadores">1 / 4</div>
        <p id="mensajeEstado">Conectando al servidor de Maracay...</p>
        <br>
        <button onclick="cancelarEspera()" style="background:#c0392b; font-size: 14px;">Cancelar</button>
    </div>
</div>

<script>
    function seleccionarModo(tipo) {
        document.getElementById('menuModos').style.display = 'none';
        document.getElementById('ventanaEspera').style.display = 'block';
        
        let meta = (tipo === 'PC') ? '1' : tipo;
        document.getElementById('contadorJugadores').innerText = "1 / " + meta;
        
        if(tipo === 'PC') {
            document.getElementById('mensajeEstado').innerText = "Cargando IA...";
            setTimeout(() => { window.location.href = 'partida.html?modo=PC'; }, 2000);
        } else {
            // Aquí tu lógica de Firebase actualizará el contador
            document.getElementById('mensajeEstado').innerText = "Esperando que otros se unan...";
            // window.location.href = 'partida.html?modo=' + tipo; 
        }
    }

    function cancelarEspera() {
        document.getElementById('menuModos').style.display = 'grid';
        document.getElementById('ventanaEspera').style.display = 'none';
    }
</script>

</body>
</html>
